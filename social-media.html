<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#00C2CB;--gold:#F4A100;--navy:#04090f;--white:#f5f5f7;--line:rgba(255,255,255,.07);--nh:64px}
html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--white);font-family:'Inter',sans-serif;overflow-x:hidden;cursor:none}

/* Cursor */
#c1{position:fixed;width:7px;height:7px;background:var(--teal);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#c2{position:fixed;width:30px;height:30px;border:1px solid rgba(0,194,203,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}

/* NAV */
nav#nav{position:fixed;top:0;left:0;right:0;z-index:600;height:var(--nh);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;background:rgba(4,9,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.n-logo img{height:28px;width:auto}
.n-brand{font-size:.95rem;font-weight:700;color:var(--white)}
.n-brand em{color:var(--teal);font-style:normal}
.n-links{display:flex;gap:28px;list-style:none;align-items:center;position:absolute;left:50%;transform:translateX(-50%)}
.n-links a{font-size:.75rem;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;font-weight:500;white-space:nowrap}
.n-links a:hover,.n-links a.active{color:var(--white)}
.n-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.n-cta{font-size:.74rem;font-weight:600;color:var(--teal);border:1px solid rgba(0,194,203,.3);padding:7px 18px;border-radius:980px;text-decoration:none;transition:all .25s;white-space:nowrap}
.n-cta:hover{background:var(--teal);color:var(--navy)}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none}
.ham span{display:block;width:22px;height:1.5px;background:var(--white);transition:all .35s;transform-origin:center}
.ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.ham.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

/* Mobile menu */
#mmenu{position:fixed;inset:0;background:rgba(4,9,15,.97);backdrop-filter:blur(28px);z-index:590;display:none;flex-direction:column;align-items:center;justify-content:center;gap:36px;opacity:0;pointer-events:none;transition:opacity .4s}
#mmenu.open{display:flex;opacity:1;pointer-events:auto}
#mmenu a{font-size:1.8rem;font-weight:700;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s}
#mmenu a:hover{color:var(--white)}
#mmenu .mm-cta{font-size:1.1rem;color:var(--teal);border:1px solid rgba(0,194,203,.3);padding:14px 36px;border-radius:980px}

/* Shared */
.sec-label{font-size:.62rem;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-label::before,.sec-label::after{content:'';width:20px;height:1px;background:var(--teal)}
.sec-label.c{justify-content:center}
.sec-h2{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;letter-spacing:-1.2px;line-height:1.12;color:var(--white)}
.rv{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.rv.on{opacity:1;transform:translateY(0)}

/* HERO */
#hero{position:relative;min-height:80vh;padding-top:var(--nh);display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,194,203,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,194,203,.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 10%,transparent 100%)}
.hero-glow{position:absolute;width:650px;height:650px;background:radial-gradient(circle,rgba(0,194,203,.07) 0%,transparent 65%);top:45%;left:50%;transform:translate(-50%,-50%)}
.hero-inner{position:relative;z-index:2;display:grid;grid-template-columns:3fr 2fr;gap:60px;align-items:center;padding:80px 6vw}
.hero-tag{font-size:.62rem;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;gap:10px;margin-bottom:16px}
.hero-tag::before,.hero-tag::after{content:'';width:20px;height:1px;background:var(--teal)}
.hero-title{font-size:clamp(2.6rem,5vw,4.8rem);font-weight:900;line-height:1.06;letter-spacing:-2px;margin-bottom:18px}
.hero-title em{color:var(--teal);font-style:normal}
.hero-sub{font-size:1rem;color:rgba(255,255,255,.45);line-height:1.9;font-weight:300;max-width:520px;margin-bottom:16px}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.btn-p{background:var(--teal);color:var(--navy);padding:11px 22px;border-radius:980px;font-weight:700;font-size:.84rem;text-decoration:none;transition:all .3s;display:inline-flex;align-items:center;gap:7px}
.btn-p:hover{transform:scale(1.04);box-shadow:0 0 36px rgba(0,194,203,.4)}
.btn-g{background:transparent;color:rgba(255,255,255,.7);padding:11px 20px;border-radius:980px;font-weight:600;font-size:.8rem;text-decoration:none;border:1px solid rgba(255,255,255,.16);transition:all .3s;display:inline-flex;align-items:center;gap:7px}
.btn-g:hover{border-color:rgba(0,194,203,.4);color:var(--white)}
.hero-right{justify-self:end;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:26px 24px;width:280px;backdrop-filter:blur(16px)}
.hero-right h3{font-size:.82rem;font-weight:700;margin-bottom:4px}
.hero-right p{font-size:.76rem;color:rgba(255,255,255,.5);line-height:1.6;font-weight:300;margin-bottom:14px}
.hero-right ul{list-style:none;font-size:.72rem;color:rgba(255,255,255,.3);display:flex;flex-direction:column;gap:4px}
.hero-right li::before{content:"• ";color:var(--teal)}

/* PROBLEMS */
#problems{padding:100px 5vw;background:#050d18;border-top:1px solid var(--line)}
.problems-grid{max-width:1100px;margin:40px auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.problem-card{background:rgba(255,255,255,.02);border-radius:18px;border:1px solid rgba(255,255,255,.06);padding:22px 18px}
.problem-card h3{font-size:.9rem;font-weight:700;margin-bottom:6px}
.problem-card p{font-size:.8rem;color:rgba(255,255,255,.42);line-height:1.7;font-weight:300}

/* PLATFORMS */
#platforms{padding:100px 5vw;background:var(--navy)}
.platforms-grid{max-width:1100px;margin:40px auto 0;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.platform-card{background:rgba(255,255,255,.02);border-radius:20px;border:1px solid rgba(255,255,255,.06);padding:22px 18px;display:flex;flex-direction:column;gap:8px;transition:all .3s}
.platform-card:hover{border-color:rgba(0,194,203,.24);transform:translateY(-3px)}
.platform-ico{font-size:1.6rem;margin-bottom:4px}
.platform-card h3{font-size:.92rem;font-weight:700}
.platform-card p{font-size:.8rem;color:rgba(255,255,255,.45);line-height:1.7;font-weight:300}
.platform-card ul{list-style:none;font-size:.76rem;color:rgba(255,255,255,.4);display:flex;flex-direction:column;gap:4px;margin-top:4px}
.platform-card li::before{content:"→ ";color:var(--teal)}

/* WHAT WE DO */
#what-we-do{padding:100px 5vw;background:#050d18}
.service-block{max-width:1100px;margin:40px auto 0;border-radius:22px;border:1px solid rgba(255,255,255,.08);background:rgba(4,9,15,.96);padding:24px 22px}
.service-block+.service-block{margin-top:22px}
.service-block h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.service-block>p{font-size:.82rem;color:rgba(255,255,255,.45);line-height:1.7;font-weight:300;margin-bottom:16px}
.service-block-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.service-block h4{font-size:.82rem;font-weight:700;margin-bottom:6px}
.service-block ul{list-style:none;font-size:.78rem;color:rgba(255,255,255,.42);line-height:1.6;font-weight:300;display:flex;flex-direction:column;gap:6px}
.service-block li::before{content:"• ";color:var(--teal)}

/* PROCESS */
#process{padding:100px 5vw;background:var(--navy)}
.process-list{max-width:900px;margin:40px auto 0;border-left:1px solid rgba(255,255,255,.08);padding-left:10px;display:flex;flex-direction:column;gap:18px}
.proc-item{display:grid;grid-template-columns:60px 1fr;gap:18px;align-items:flex-start}
.proc-step{width:24px;height:24px;border-radius:50%;border:1px solid rgba(0,194,203,.4);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--teal);background:rgba(0,194,203,.08);box-shadow:0 0 0 4px rgba(0,194,203,.12);margin-top:4px}
.proc-body h3{font-size:.9rem;font-weight:700;margin-bottom:4px}
.proc-body p{font-size:.8rem;color:rgba(255,255,255,.42);line-height:1.7;font-weight:300;margin-bottom:6px}
.proc-body ul{list-style:none;font-size:.76rem;color:rgba(255,255,255,.4);display:flex;flex-direction:column;gap:4px}
.proc-body li::before{content:"– ";color:rgba(255,255,255,.35)}

/* RESULTS */
#results{padding:100px 5vw;background:#050d18}
.results-grid{max-width:1100px;margin:40px auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.result-card{background:rgba(255,255,255,.02);border-radius:20px;border:1px solid rgba(255,255,255,.07);padding:22px 18px}
.result-card h3{font-size:.9rem;font-weight:700;margin-bottom:6px}
.result-card p{font-size:.8rem;color:rgba(255,255,255,.45);line-height:1.7;font-weight:300;margin-bottom:8px}
